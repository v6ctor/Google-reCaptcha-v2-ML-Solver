<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: sans-serif; width: 220px; padding: 12px; background: #1e1e1e; color: #eee; }
    h3   { margin: 0 0 8px; font-size: 14px; }
    p    { font-size: 12px; color: #aaa; margin: 4px 0; }
    label { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
    input[type=range] { width: 100%; }
    .row { margin: 10px 0; }
  </style>
</head>
<body>
  <h3>reCAPTCHA Solver</h3>
  <div class="row">
    <label>
      <input type="checkbox" id="enabled" checked>
      Enabled
    </label>
  </div>
  <div class="row">
    <p>Confidence threshold: <strong id="threshVal">60%</strong></p>
    <input type="range" id="threshold" min="30" max="95" value="60">
  </div>
  <script src="popup.js"></script>
</body>
</html>
